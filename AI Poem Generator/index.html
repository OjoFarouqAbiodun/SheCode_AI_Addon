<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI POEM GENERATOR</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>AI French Poem Generator</h1>
    </header>

    <main>
      <form>
        <input type="text" placeholder="Enter the topic of the French poem" autofocus required autocomplete="off"
          class="instructions" />
        <input type="submit" class="submit-button" />
      </form>
      <div class="poem">
        La tombe dit à la rose
        <br />
        Des pleurs dont l'aube t'arrose
      </div>
    </main>

    <footer>
      This AI project was coded by
      <a href="https://github.com/Harbey-Graphics" target="_blank">Harbey Graphics</a> and
      is
      <a href="https://github.com/Harbey-Graphics/Poem_Generator" target="_blank">
        open-sourced on GitHub</a>
      and is
      <a href="https://poemgeneratorbyharbey.netlify.app/" target="_blank">hosted on Netlify</a>.
    </footer>
  </div>

  <script src="index.js"></script>
</body>

</html>
